name: galahad

services:
    
    client:
        image: instituutnederlandsetaal/galahad-client:$VERSION
        build:
            context: client
        restart: unless-stopped

    server:
        image: instituutnederlandsetaal/galahad-server:$VERSION
        build:
            context: server
        restart: unless-stopped
        volumes:
            - user-corpora:/data/corpora/user
            - benchmark-corpora:/data/corpora/datasets
            - admins:/data/admins
        networks:
            - taggers
            - default
        deploy:
            resources:
                limits:
                    cpus: '2.00'
                    memory: 8G # should be higher that the java heap size
                reservations:
                    cpus: '1.00'
                    memory: 2G
        environment: # Otherwise container doesn't restart on OutOfMemory
            - "JAVA_OPTS=-XX:+ExitOnOutOfMemoryError"
    
    proxy:
        image: nginx:1.28.0-alpine3.21-slim
        restart: unless-stopped
        volumes:
            - ./proxy/nginx.conf:/etc/nginx/nginx.conf
        depends_on:
            - client
            - server
        ports:
            - $PORT:80


networks:
    default:
    taggers:
        external: true
        name: $TAGGERS_NETWORK

volumes:
    user-corpora:
    benchmark-corpora:
    admins:
