name: spacy
description: Dutch spaCy pipeline with  tok2vec, morphologizer, tagger, parser, lemmatizer, senter & ner.
language: Dutch
period:
  from: 1960
  to: 2024
annotations:
  - annotation: token
  - annotation: lemma
    principles:
      - name: Universal Dependencies
        description: D-COI POS-tagging and lemmatization manual
        url: https://www.let.rug.nl/vannoord/Lassy/POS_manual.pdf
  - annotation: pos
    principles:
      - name: Universal Dependencies
        description: D-COI POS-tagging and lemmatization manual
        url: https://www.let.rug.nl/vannoord/Lassy/POS_manual.pdf
  - annotation: upos
    principles:
      - name: Universal Dependencies
        description: UD for Dutch (v2)
        url: https://universaldependencies.org/nl/index.html
  - annotation: head
    principles:
      - name: Universal Dependencies
        description: Lassy Syntactic Annotation Manual
        url: https://www.let.rug.nl/~vannoord/Lassy/sa-man_lassy.pdf
  - annotation: deprel
    principles:
      - name: Universal Dependencies
        description: Lassy Syntactic Annotation Manual
        url: https://www.let.rug.nl/~vannoord/Lassy/sa-man_lassy.pdf
  - annotation: ner
    principles:
      - name: OntoNotes named entities
        description: OntoNotes Release 5.0
        url: https://doi.org/10.35111/xmhb-2b84
attributions:
  - name: Dataset
    description: UD Dutch LassySmall v2.8, Dutch NER Annotations for UD LassySmall, UD Dutch Alpino v2.8, Explosion fastText Vectors
    url: https://github.com/explosion/spacy-models/releases/tag/nl_core_news_lg-3.8.0
  - name: Software
    description: spaCy 3.8.5
    url: https://spacy.io/
  - name: Model
    description: nl_core_news_lg-3.8.0
    url: https://github.com/explosion/spacy-models/releases/tag/nl_core_news_lg-3.8.0
  - name: Trained by
    description: spaCy
    url: https://spacy.io/
port: 8120
