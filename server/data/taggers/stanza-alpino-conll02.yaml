name: stanza-alpino-conll02
description: Stanza trained on conll02 for NER and alpino for the rest
language: Dutch
period:
  from: 1960
  to: 2002
annotations:
  - annotation: token
  - annotation: lemma
    principles:
      - name: Universal Dependencies
        description: D-COI POS-tagging and lemmatization manual
        url: https://www.let.rug.nl/vannoord/Lassy/POS_manual.pdf
  - annotation: pos
    principles:
      - name: Universal Dependencies
        description: D-COI POS-tagging and lemmatization manual
        url: https://www.let.rug.nl/vannoord/Lassy/POS_manual.pdf
  - annotation: upos
    principles:
      - name: Universal Dependencies
        description: UD for Dutch (v2)
        url: https://universaldependencies.org/nl/index.html
  - annotation: head
    principles:
      - name: Universal Dependencies
        description: Lassy Syntactic Annotation Manual
        url: https://www.let.rug.nl/~vannoord/Lassy/sa-man_lassy.pdf
  - annotation: deprel
    principles:
      - name: Universal Dependencies
        description: Lassy Syntactic Annotation Manual
        url: https://www.let.rug.nl/~vannoord/Lassy/sa-man_lassy.pdf
  - annotation: ner
    principles:
      - name: CoNLL02
        description: CoNLL-2002 shared task
        url: https://www.clips.uantwerpen.be/conll2002/ner/
attributions:
  - name: Dataset (non-NER)
    description: Dutch Alpino (Universal Dependencies v2.12)
    url: https://github.com/UniversalDependencies/UD_Dutch-Alpino
  - name: Dataset (NER)
    description: CoNLL-2002 Dutch
    url: https://www.clips.uantwerpen.be/conll2002/ner/
  - name: Software
    description: Stanza 1.10.1
    url: https://stanfordnlp.github.io/stanza/
  - name: Model (NER)
    description: CoNLL02 Dutch
    url: https://stanfordnlp.github.io/stanza/ner_models.html
  - name: Model (non-NER)
    description: LassySmall
    url: https://stanfordnlp.github.io/stanza/performance.html
  - name: Trained by
    description: Stanford NLP Group
    url: https://stanfordnlp.github.io/stanza/
port: 8121

