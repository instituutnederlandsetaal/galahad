name: stanza-lassysmall-wikiner
uri: https://stanfordnlp.github.io/stanza/
version: 1.10.1
description: Stanza trained on wikiner for NER and lassysmall for the rest
language: Dutch
period:
  from: 1960
  to: 2024
annotations:
  - annotation: token
  - annotation: lemma
    principles:
      - name: Universal Dependencies
        details: D-COI POS-tagging and lemmatization manual
        href: https://www.let.rug.nl/vannoord/Lassy/POS_manual.pdf
  - annotation: pos
    principles:
      - name: Universal Dependencies
        details: D-COI POS-tagging and lemmatization manual
        href: https://www.let.rug.nl/vannoord/Lassy/POS_manual.pdf
  - annotation: upos
    principles:
      - name: Universal Dependencies
        details: UD for Dutch (v2)
        href: https://universaldependencies.org/nl/index.html
  - annotation: head
    principles:
      - name: Universal Dependencies
        details: Lassy Syntactic Annotation Manual
        href: https://www.let.rug.nl/~vannoord/Lassy/sa-man_lassy.pdf
  - annotation: deprel
    principles:
      - name: Universal Dependencies
        details: Lassy Syntactic Annotation Manual
        href: https://www.let.rug.nl/~vannoord/Lassy/sa-man_lassy.pdf
  - annotation: ner
    principles:
      - name: WikiNER
        details: Learning multilingual named entity recognition from Wikipedia
        href: http://dx.doi.org/10.1016/j.artint.2012.03.006
attributions:
  - name: Dataset (non-NER)
    details: Dutch LassySmall (Universal Dependencies v2.12)
    href: https://github.com/UniversalDependencies/UD_Dutch-LassySmall
  - name: Dataset (NER)
    details: WikiNER Dutch
    href: https://figshare.com/articles/dataset/Learning_multilingual_named_entity_recognition_from_Wikipedia/5462500
  - name: Software
    details: Stanza 1.10.1
    href: https://stanfordnlp.github.io/stanza/
  - name: Model (NER)
    details: WikiNER Dutch
    href: https://stanfordnlp.github.io/stanza/ner_models.html
  - name: Model (non-NER)
    details: LassySmall
    href: https://stanfordnlp.github.io/stanza/performance.html
  - name: Trained by
    details: Stanford NLP Group
    href: https://stanfordnlp.github.io/stanza/
port: 8122
