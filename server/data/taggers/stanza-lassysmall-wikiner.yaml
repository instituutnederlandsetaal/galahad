name: stanza-lassysmall-wikiner
description: Stanza trained on wikiner for NER and lassysmall for the rest
language: Dutch
period:
  from: 1960
  to: 2024
annotations:
  - annotation: token
  - annotation: lemma
    principles:
      - name: Universal Dependencies
        description: D-COI POS-tagging and lemmatization manual
        url: https://www.let.rug.nl/vannoord/Lassy/POS_manual.pdf
  - annotation: pos
    principles:
      - name: Universal Dependencies
        description: D-COI POS-tagging and lemmatization manual
        url: https://www.let.rug.nl/vannoord/Lassy/POS_manual.pdf
  - annotation: upos
    principles:
      - name: Universal Dependencies
        description: UD for Dutch (v2)
        url: https://universaldependencies.org/nl/index.html
  - annotation: head
    principles:
      - name: Universal Dependencies
        description: Lassy Syntactic Annotation Manual
        url: https://www.let.rug.nl/~vannoord/Lassy/sa-man_lassy.pdf
  - annotation: deprel
    principles:
      - name: Universal Dependencies
        description: Lassy Syntactic Annotation Manual
        url: https://www.let.rug.nl/~vannoord/Lassy/sa-man_lassy.pdf
  - annotation: ner
    principles:
      - name: WikiNER
        description: Learning multilingual named entity recognition from Wikipedia
        url: http://dx.doi.org/10.1016/j.artint.2012.03.006
attributions:
  - name: Dataset (non-NER)
    description: Dutch LassySmall (Universal Dependencies v2.12)
    url: https://github.com/UniversalDependencies/UD_Dutch-LassySmall
  - name: Dataset (NER)
    description: WikiNER Dutch
    url: https://figshare.com/articles/dataset/Learning_multilingual_named_entity_recognition_from_Wikipedia/5462500
  - name: Software
    description: Stanza 1.10.1
    url: https://stanfordnlp.github.io/stanza/
  - name: Model (NER)
    description: WikiNER Dutch
    url: https://stanfordnlp.github.io/stanza/ner_models.html
  - name: Model (non-NER)
    description: LassySmall
    url: https://stanfordnlp.github.io/stanza/performance.html
  - name: Trained by
    description: Stanford NLP Group
    url: https://stanfordnlp.github.io/stanza/
port: 8122
